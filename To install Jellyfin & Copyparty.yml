#COPY THIS WHOLE THING, PASTE IT ON SSH TERMINAL & CLICK ENTER

echo -e "\n\e[1;36m====================================================\e[0m"
echo -e "\e[1;33m  One click install of Jellyfin & Copyparty (Termux native)  \e[0m"
echo -e "\e[1;36m====================================================\e[0m\n"

# 1. Update system
pkg update -y && pkg upgrade -y

# 2. Install required packages
pkg install python python-pip iproute2 procps nano wget tar ffmpeg -y

# 3. Setup storage
echo "y" | termux-setup-storage

# 4. Install Copyparty
pip install --upgrade pip
pip install copyparty

# 5. Download Jellyfin portable build (arm64)
mkdir -p ~/jellyfin
cd ~/jellyfin
wget https://repo.jellyfin.org/releases/server/portable/latest/jellyfin-portable_arm64.tar.gz -O jellyfin.tar.gz
tar -xvzf jellyfin.tar.gz
rm jellyfin.tar.gz

# 6. Create boot script
mkdir -p ~/.termux/boot
cat <<EOF > ~/.termux/boot/start-services.sh
#!/data/data/com.termux/files/usr/bin/sh
termux-wake-lock
pkill -9 -f "jellyfin|copyparty"
sleep 2
# Start Jellyfin
DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1 \
dotnet \$HOME/jellyfin/jellyfin.dll --ffmpeg \$(which ffmpeg) &
sleep 15
# Start Copyparty
python3 -m copyparty -v /storage/emulated/0:/root:rwadm,admin -a admin:password -e2dsa &
EOF

chmod +x ~/.termux/boot/start-services.sh

# 7. Aliases
touch ~/.bashrc
sed -i '/# Service Aliases/,/alias status/d' ~/.bashrc
cat <<EOF >> ~/.bashrc
# Service Aliases
alias up='nohup bash ~/.termux/boot/start-services.sh > /dev/null 2>&1 &'
alias down='pkill -9 -f "jellyfin|copyparty"'
alias status='pgrep -fl "jellyfin|copyparty"'
EOF

# 8. Start services
source ~/.bashrc
nohup bash ~/.termux/boot/start-services.sh > /dev/null 2>&1 &
sleep 5
MY_IP=$(ip route get 1.1.1.1 2>/dev/null | grep -oP 'src \K\S+')
[ -z "$MY_IP" ] && MY_IP="127.0.0.1"

echo -e "\n\e[1;32m✅ Setup Complete & Apps are now RUNNING!\e[0m"
echo -e "\n\e[1;34mAccess your apps here:\e[0m"
echo -e "\e[1;37mJellyfin:  http://$MY_IP:8096\e[0m"
echo -e "\e[1;37mCopyparty: http://$MY_IP:3923 (Login: admin / Password: password)\e[0m"
echo -e "\n\e[1;33mCommands to remember:\e[0m"
echo -e "\e[1;37m'up' to start | 'down' to stop | 'status' to check\e[0m\n"
